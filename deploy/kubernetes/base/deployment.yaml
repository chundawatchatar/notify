apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-api
  labels:
    app.kubernetes.io/name: notify-api
    app.kubernetes.io/part-of: notify
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: notify-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notify-api
        app.kubernetes.io/part-of: notify
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: notify-api:replace-with-immutable-tag
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: notify-api-runtime
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PORT
              value: "4100"
            - name: METRICS_ENABLED
              value: "true"
            - name: METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notify-api-runtime
                  key: metrics-token
          ports:
            - name: http
              containerPort: 4100
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health/live
              port: http
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
