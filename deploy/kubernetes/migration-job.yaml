apiVersion: batch/v1
kind: Job
metadata:
  generateName: notify-api-migrate-
  labels:
    app.kubernetes.io/name: notify-api-migrate
    app.kubernetes.io/part-of: notify
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notify-api-migrate
        app.kubernetes.io/part-of: notify
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: notify-api:replace-with-immutable-tag
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/migrate"]
          envFrom:
            - secretRef:
                name: notify-api-runtime
          env:
            - name: METRICS_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
