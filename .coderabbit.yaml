reviews:
  request_changes_workflow: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 10
    drafts: false
    base_branches:
      - "develop"
      - "release/.*"
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    labels:
      - "!do-not-review"
    description_keyword: ""
  pre_merge_checks:
    title:
      mode: error
      requirements: >-
        Ticketed pull request titles must follow `[NFY-123] Concise title`.
        Repository maintenance work without a Linear ticket may use
        `[Chore] Concise title`.
